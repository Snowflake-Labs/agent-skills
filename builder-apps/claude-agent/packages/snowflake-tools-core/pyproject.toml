[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "snowflake-tools-core"
version = "0.1.0"
description = "Core Snowflake tool implementations for MCP and agent integrations"
requires-python = ">=3.11"
dependencies = [
  "snowflake-connector-python>=3.6.0",
]

[tool.setuptools.packages.find]
where = ["src"]
